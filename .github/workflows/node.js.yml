# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches:
        - main
        - issue-*
  pull_request:
    branches:
        - main
        - issue-*
permissions:
  statuses: write
  checks: write
  contents: write
  pull-requests: write

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      AUTH_USERNAME: ${{secrets.AUTH_USERNAME}}
      AUTH_PASSWORD: ${{secrets.AUTH_PASSWORD}}
      SECRET_KEY: ${{secrets.SECRET_KEY}}

    strategy:
      matrix:
        node-version: [20.x,22.x,24.x]

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Create .env from secrets
      run: |
        cat > .env <<'EOF'
        AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}
        AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        EOF

    - name: Start Restful E-commerce using Docker Compose
      run: docker compose -f docker-compose-ecommerce.yml up -d

    - name: Wait until API is ready
      run: npx wait-on --timeout 60000 --interval 5000 http://localhost:3004/health

    - name: Run Tests
      run: npm test

    - name: Stop the service
      if: always()
      run: docker compose -f docker-compose-ecommerce.yml down --remove-orphans
    
    - name: Test Report
      uses: dorny/test-reporter@v3
      if: success() || failure()
      with:
          name: Test Results        
          path: ${{ github.workspace }}/reports/test-results.json
          reporter: 'mocha-json'